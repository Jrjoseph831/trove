name: Deploy AWS (shared world)

# Deploys the Trove shared-world stack (DynamoDB + Settlement/Read Lambdas +
# the 6h EventBridge clock + the public read API) via CDK. Authenticates with
# GitHub OIDC — no stored AWS keys. Requires one-time setup (see
# infra/README.md): deploy the OIDC role, run `cdk bootstrap`, and set the
# AWS_DEPLOY_ROLE_ARN + AWS_REGION repo variables.

on:
  push:
    # main → deploys the prod stack (TroveShared); beta → deploys the isolated
    # staging stack (TroveStaging). Prod is never touched by a beta push.
    branches: [main, beta]
    paths:
      - "infra/**"
      - "packages/server/**"
      - "packages/engine/**"
      - "packages/data/**"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch:

permissions:
  id-token: write # required to request the OIDC token
  contents: read

concurrency:
  group: deploy-aws
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip cleanly if the deploy role hasn't been configured yet.
    if: vars.AWS_DEPLOY_ROLE_ARN != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify — typecheck + economy invariant tests
        run: |
          npm run -w @trove/data typecheck
          npm run -w @trove/engine typecheck
          npm run -w @trove/engine test
          npm run -w @trove/server typecheck
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Clean up a failed staging stack (beta only)
        # A first-ever CREATE that fails leaves the stack in ROLLBACK_COMPLETE,
        # which CloudFormation refuses to update — it must be deleted first.
        # Scoped to beta + TroveStaging, so prod is never affected.
        if: github.ref_name == 'beta'
        run: |
          st=$(aws cloudformation describe-stacks --stack-name TroveStaging \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo NONE)
          echo "TroveStaging status: $st"
          case "$st" in
            ROLLBACK_COMPLETE|ROLLBACK_FAILED|UPDATE_ROLLBACK_FAILED|CREATE_FAILED|DELETE_FAILED|REVIEW_IN_PROGRESS)
              echo "Deleting failed stack so it can be recreated cleanly…"
              aws cloudformation delete-stack --stack-name TroveStaging
              aws cloudformation wait stack-delete-complete --stack-name TroveStaging || true
              st=NONE ;;
          esac
          if [ "$st" = "NONE" ]; then
            echo "No stack owns the staging tables — removing any orphans for a clean create…"
            for t in market players ownership orders; do
              if aws dynamodb describe-table --table-name "trove-staging-$t" >/dev/null 2>&1; then
                aws dynamodb delete-table --table-name "trove-staging-$t" >/dev/null
                aws dynamodb wait table-not-exists --table-name "trove-staging-$t"
                echo "  dropped orphaned trove-staging-$t"
              fi
            done
          else
            echo "Healthy stack present — no cleanup needed."
          fi
      - name: CDK deploy
        working-directory: infra
        # main → TroveShared (prod); beta → TroveStaging (isolated staging world).
        # Google federation turns on when these are set (empty = email-only).
        run: >-
          npx cdk deploy
          ${{ github.ref_name == 'beta' && 'TroveStaging' || 'TroveShared' }}
          --require-approval never --outputs-file cdk-outputs.json
          -c googleClientId="${{ vars.GOOGLE_CLIENT_ID }}"
          -c googleClientSecret="${{ secrets.GOOGLE_CLIENT_SECRET }}"
      - name: Show outputs
        working-directory: infra
        run: cat cdk-outputs.json
