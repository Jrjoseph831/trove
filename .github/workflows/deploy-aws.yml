name: Deploy AWS (shared world)

# Deploys the Trove shared-world stack (DynamoDB + Settlement/Read Lambdas +
# the 6h EventBridge clock + the public read API) via CDK. Authenticates with
# GitHub OIDC — no stored AWS keys. Requires one-time setup (see
# infra/README.md): deploy the OIDC role, run `cdk bootstrap`, and set the
# AWS_DEPLOY_ROLE_ARN + AWS_REGION repo variables.

on:
  push:
    # main → deploys the prod stack (TroveShared); beta → deploys the isolated
    # staging stack (TroveStaging). Prod is never touched by a beta push.
    branches: [main, beta]
    paths:
      - "infra/**"
      - "packages/server/**"
      - "packages/engine/**"
      - "packages/data/**"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch:

permissions:
  id-token: write # required to request the OIDC token
  contents: read

concurrency:
  group: deploy-aws
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip cleanly if the deploy role hasn't been configured yet.
    if: vars.AWS_DEPLOY_ROLE_ARN != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify — typecheck + economy invariant tests
        run: |
          npm run -w @trove/data typecheck
          npm run -w @trove/engine typecheck
          npm run -w @trove/engine test
          npm run -w @trove/server typecheck
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: CDK deploy
        working-directory: infra
        # main → TroveShared (prod); beta → TroveStaging (isolated staging world).
        # Google federation turns on when these are set (empty = email-only).
        run: >-
          npx cdk deploy
          ${{ github.ref_name == 'beta' && 'TroveStaging' || 'TroveShared' }}
          --require-approval never --outputs-file cdk-outputs.json
          -c googleClientId="${{ vars.GOOGLE_CLIENT_ID }}"
          -c googleClientSecret="${{ secrets.GOOGLE_CLIENT_SECRET }}"
      - name: Show outputs
        working-directory: infra
        run: cat cdk-outputs.json
